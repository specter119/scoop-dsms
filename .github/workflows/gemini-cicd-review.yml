name: Gemini CI Review
run-name: >-
  ${{
    github.event_name == 'workflow_run'
    && format(
      'Gemini CI Review · {0} #{1}',
      github.event.workflow_run.name,
      github.event.workflow_run.run_number
    )
    || format(
      'Gemini CI Review · manual · run {0}',
      inputs.run_id != '' && inputs.run_id || 'unspecified'
    )
  }}

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: GitHub Actions run ID to inspect
        required: false
        type: string
  workflow_run:
    workflows:
      - Pull Requests
      - Excavator
      - Issues
      - Commented Pull Request
    types:
      - completed

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'success' }}
    name: Analyze Failed Run
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip when GEMINI_API_KEY is missing
        if: ${{ env.GEMINI_API_KEY == '' }}
        run: |
          {
            echo "## Gemini CI Review"
            echo
            echo "Skipped because \`GEMINI_API_KEY\` is not configured for this repository."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve run ID
        if: ${{ env.GEMINI_API_KEY != '' }}
        id: resolve
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_RUN_ID}" ]]; then
            echo "run_id=${INPUT_RUN_ID}" >> "$GITHUB_OUTPUT"
          elif [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            echo "run_id=${WORKFLOW_RUN_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect CI context
        if: ${{ env.GEMINI_API_KEY != '' && steps.resolve.outputs.run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          set -euo pipefail
          mkdir -p .ci
          printf '%s\n' "${EVENT_PAYLOAD}" > .ci/event.json
          gh run view "${RUN_ID}" --json name,displayTitle,event,status,conclusion,headBranch,headSha,url,createdAt,updatedAt > .ci/run.json
          gh run view "${RUN_ID}" --log-failed > .ci/failed.log || gh run view "${RUN_ID}" --log > .ci/full.log || true
          cp .appveyor.yml .ci/appveyor.yml

      - name: Review CI failure with Gemini
        if: ${{ env.GEMINI_API_KEY != '' && steps.resolve.outputs.run_id != '' }}
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ env.GEMINI_API_KEY }}
          upload_artifacts: true
          workflow_name: gemini-ci-review
          prompt: |
            You are reviewing a failed CI/CD run for the scoop-dsms bucket repository.

            Read these files:
            - .ci/run.json
            - .ci/failed.log if present
            - .ci/full.log if present
            - .ci/event.json
            - .ci/appveyor.yml
            - .github/workflows/*.yml

            Produce a concise Markdown report with these sections:
            1. Summary
            2. Most likely root cause
            3. Affected scope
            4. Recommended next actions

            Important constraints:
            - Focus only on CI/CD failure analysis.
            - Do not propose README updates.
            - Do not modify any files.
          settings: |-
            {
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }

      - name: Publish Gemini summary
        if: ${{ env.GEMINI_API_KEY != '' && steps.resolve.outputs.run_id != '' }}
        run: |
          {
            echo "## Gemini CI Review"
            echo
            printf '%s\n' "${GEMINI_SUMMARY}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}

      - name: Comment on pull request
        if: ${{ env.GEMINI_API_KEY != '' && github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}
        run: |
          set -euo pipefail
          mkdir -p .ci
          {
            echo "## Gemini CI Review"
            echo
            printf '%s\n' "${GEMINI_SUMMARY}"
          } > .ci/pr-comment.md
          gh pr comment "${PR_NUMBER}" --body-file .ci/pr-comment.md
