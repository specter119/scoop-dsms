on:
  schedule:
    - cron: "0 * * * *"
name: Excavator
permissions:
  contents: write
jobs:
  excavate:
    name: Excavator
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@main
      - uses: astral-sh/setup-uv@v6
      - name: Excavate
        uses: specter119/Shovel-GithubActions@main
        with:
          post_update_commands: uvx prek -a
        env:
          GITH_EMAIL: specter119@gmail.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: "1"
          SCOOP_BRANCH: main
