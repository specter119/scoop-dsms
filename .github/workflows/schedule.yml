on:
  schedule:
  - cron: '0 * * * *'
name: Excavator
permissions:
  contents: write
jobs:
  excavate:
    name: Excavator
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@main
    - name: Excavate
      uses: specter119/Shovel-GithubActions@main
      env:
        GITH_EMAIL: specter119@gmail.com
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SKIP_UPDATED: '1'
        SCOOP_BRANCH: main
    - name: Regenerate README
      run: python scripts/generate_readme.py --write
    - name: Commit README changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: regenerate README"
        git push
