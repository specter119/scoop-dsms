version: 2.2.1
description: A local DNS proxy for Windows with caching and custom HOSTS file support for wildcards and regular expressions
homepage: https://mayakron.altervista.org/support/acrylic/Home.htm
license: GPL-2.0-only
url: https://downloads.sourceforge.net/project/acrylic/Acrylic/2.2.1/Acrylic-Portable.zip
