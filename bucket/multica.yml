    hash: sha512:5d677db747ae86232d76595a0c11d8efb3b37506f71bb49ecb2214b29307c6974207322f7be2cab8d39114abb3389ec863179a3269e2a18ab1d016c4abbbd96e
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-64.7z $dir -Removal
