  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.24/multica-desktop-0.3.24-windows-arm64.exe#/dl.7z
    hash: sha512:2f40da709aa74c742398aa3f8371ae3ecd686f40489775fe0b876a7bc70970497aebce0ff016684941bff6cec6bee63d137087d489f1010538beb06b171de0d8
