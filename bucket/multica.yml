  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.22/multica-desktop-0.3.22-windows-arm64.exe#/dl.7z
    hash: sha512:bfafaf79c3aa2a62056ce73966074524df22500a4abe9c0e10bb4dde0a8ed1acf58e871f7c3801bf6615e4b7a63a3a9dcc9354c8116748b99c4c1b8d8bd5363c
