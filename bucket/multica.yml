    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.6/multica-desktop-0.3.6-windows-arm64.exe#/dl.7z
    hash: sha512:c661c78d8a579ddb27f4ab8ea59dea52112ac20ed4d17b571cbd15fb20836deec7bb7d3be56ede9700be27775242d3576a2d849e3d0f1fe0a8d1983e28216653
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-arm64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
shortcuts:
- - Multica.exe
  - Multica
checkver:
  github: https://github.com/multica-ai/multica
autoupdate:
  architecture:
    64bit:
      url: https://github.com/multica-ai/multica/releases/download/v$version/multica-desktop-$version-windows-x64.exe#/dl.7z
      hash:
        url: $baseurl/latest.yml
        regex: sha512:\s+$base64
