  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.14/multica-desktop-0.3.14-windows-arm64.exe#/dl.7z
    hash: sha512:26b55475cab27246b018ed09d1fabe66431d8f36b9894ba500ccc21200f295066aee9bd3f7d78327a1cd7b8221e7a756735a8f48282dcf30076ceb518437c505
