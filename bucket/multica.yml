    hash: sha512:dfab9533e27a716253732902fda2422dfe091d4ae6885af7fbe9142b7e6464532808eac3ea4a0157235d30f8006cf0216ec87872b552edb72cfe7ea834364236
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.16/multica-desktop-0.3.16-windows-arm64.exe#/dl.7z
    hash: sha512:5abf5d760948540c7dfa679f7d894d2f9f65477f7be39c083d20c63dccf89197e091323c8606a2bf04da1d999b4483886c9e26dcebbbb004006714b7b11dec97
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-arm64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
shortcuts:
- - Multica.exe
  - Multica
checkver:
  github: https://github.com/multica-ai/multica
autoupdate:
  architecture:
    64bit:
      url: https://github.com/multica-ai/multica/releases/download/v$version/multica-desktop-$version-windows-x64.exe#/dl.7z
      hash:
        url: $baseurl/latest.yml
        regex: sha512:\s+$base64
