  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.5/multica-desktop-0.3.5-windows-arm64.exe#/dl.7z
    hash: sha512:0760aaa20e333d21f9e883ea79b0fdfd6885c06c9a204ffeab391002666090c9f5b49307f08179b0e8607a4630865e797f25e264f4f7ab332255ad49de0b126c
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-arm64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
shortcuts:
- - Multica.exe
  - Multica
checkver:
  github: https://github.com/multica-ai/multica
autoupdate:
