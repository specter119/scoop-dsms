  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.17/multica-desktop-0.3.17-windows-arm64.exe#/dl.7z
    hash: sha512:1622c7dc12cbd45b7f010af99710e1a5c26b09bf95672854831a8cdca028152767069bf4644d5862c9cebc1197defc8873663532f52a0f70e5a84deae83e8975
