version: 0.3.1
description: The open-source managed agents platform. Turn coding agents into real teammates — assign tasks, track progress, compound skills.
homepage: https://github.com/multica-ai/multica
license:
  identifier: MIT
  url: https://github.com/multica-ai/multica/blob/main/LICENSE
architecture:
  64bit:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.1/multica-desktop-0.3.1-windows-x64.exe#/dl.7z
    hash: sha512:04cbcb64d40a67364897e8d9763f6265d5dbdd28381e315f5995dc5f473f5983851686b17c354840c16048c140a3cf2019d620508f74966283324e3a5ec12771
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.1/multica-desktop-0.3.1-windows-arm64.exe#/dl.7z
    hash: sha512:2190fcd50153064e3d527925683c3f8e698062c5f069a700c1d16a1ae54f23d799a6a154c61fa52b010e247d796fb74e8350ad51a5061c4b005c877a968d3b4c
    pre_install:
    - Expand-7zipArchive $dir/`$PLUGINSDIR/app-arm64.7z $dir -Removal
    - Remove-Item "$dir\`$PLUGINSDIR", "$dir\`$R0", "$dir\uninstallerIcon.ico" -Recurse -Force -ErrorAction SilentlyContinue
shortcuts:
- - Multica.exe
  - Multica
checkver:
  github: https://github.com/multica-ai/multica
autoupdate:
  architecture:
    64bit:
      url: https://github.com/multica-ai/multica/releases/download/v$version/multica-desktop-$version-windows-x64.exe#/dl.7z
      hash:
        url: $baseurl/latest.yml
        regex: sha512:\s+$base64
    arm64:
      url: https://github.com/multica-ai/multica/releases/download/v$version/multica-desktop-$version-windows-arm64.exe#/dl.7z
      hash:
        url: $baseurl/latest-arm64.yml
        regex: sha512:\s+$base64
