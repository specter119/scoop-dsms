  arm64:
    url: https://github.com/multica-ai/multica/releases/download/v0.3.11/multica-desktop-0.3.11-windows-arm64.exe#/dl.7z
    hash: sha512:95d4da920eed6c489bcd7a05d93e9b45e3cc2a4228b8ac879ca5061f2bb6a75d0ed921f5df7f20c38fd7ed3751c40932e2b57bac9d797fdf6994252b7d10ac9c
